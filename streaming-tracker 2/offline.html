<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | DataSphere Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
      text-align: center;
    }
    .offline-wrapper {
      max-width: 450px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .offline-icon {
      width: 64px;
      height: 64px;
      color: var(--color-danger);
      background-color: var(--color-danger-bg);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .offline-icon svg {
      width: 32px;
      height: 32px;
    }
    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      width: 100%;
    }
    .btn-group .btn {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="offline-wrapper">
    <div class="offline-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M9 16.25a3 3 0 00-3 3v.25M6 19.5h12m-12 0H5.25a.75.75 0 01-.75-.75V18a6 6 0 016-6h3.75m-6.75 7.5V18a3 3 0 013-3h.75m11.25 4.5a3 3 0 01-3-3v-.25m3 3.25h1.5a.75.75 0 00.75-.75V18a6 6 0 00-6-6h-3.75m6.75 7.5V18a3 3 0 00-3-3h-.75" />
      </svg>
    </div>
    
    <h2>No Internet Connection</h2>
    
    <p>
      It looks like you are currently offline. You can still access previously loaded dashboard data, but live updates from the Google Sheet cannot be fetched.
    </p>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="location.reload()">Retry Connection</button>
      <a class="btn" href="./index.html">View Cached Data</a>
    </div>
  </div>

  <script>
    // Inherit light/dark mode preference in offline view
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</body>
</html>
